name: Ensure branch exists
description: Create the target branch from a base if it does not exist on origin, and optionally apply protection.
inputs:
  branch:
    description: Branch name to ensure (e.g. test, main)
    required: true
  base:
    description: Branch to fork from when creating (defaults to dev)
    required: false
    default: dev
  protect:
    description: 'If "true", apply branch protection via gh api'
    required: false
    default: 'false'
  token:
    description: PAT with contents:write and (if protect=true) administration:write
    required: true
runs:
  using: composite
  steps:
    - name: Ensure branch
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        BRANCH: ${{ inputs.branch }}
        BASE: ${{ inputs.base }}
        PROTECT: ${{ inputs.protect }}
      run: |
        set -euo pipefail
        git fetch origin "$BRANCH" 2>/dev/null && exists=1 || exists=0
        if [ "$exists" = "0" ]; then
          echo "Branch $BRANCH does not exist. Creating from $BASE."
          git fetch origin "$BASE"
          git push origin "refs/remotes/origin/$BASE:refs/heads/$BRANCH"
        else
          echo "Branch $BRANCH already exists."
        fi
        if [ "$PROTECT" = "true" ]; then
          echo "Applying branch protection on $BRANCH."
          gh api -X PUT "repos/${GITHUB_REPOSITORY}/branches/${BRANCH}/protection" \
            -H "Accept: application/vnd.github+json" \
            -f required_status_checks=null \
            -F enforce_admins=false \
            -f required_pull_request_reviews='{"required_approving_review_count":0}' \
            -f restrictions=null \
            -F allow_force_pushes=false \
            -F allow_deletions=false \
            || echo "Protection update failed (token may lack admin scope); continuing."
        fi
