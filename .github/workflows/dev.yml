name: dev — build & promote to test branch

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: saas-dev
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_DEP_TOKEN: ${{ secrets.GH_DEP_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.CI_PAT }}

      - uses: ./.github/actions/ensure-branch
        with:
          branch: test
          base: dev
          protect: 'true'
          token: ${{ secrets.CI_PAT }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Resolve and install fundrates-arb
        run: node scripts/install-arb.mjs
      
      - name: Debug downloaded package structure
        run: ls -R node_modules/@jpytrader/fundrates-arb

      - run: bun run lint
      - run: bun run test --if-present
      - run: bun run build

      - name: Push build output to test branch
        env:
          GH_TOKEN: ${{ secrets.CI_PAT }}
        run: |
          set -euo pipefail
          SHA_SHORT=$(git rev-parse --short HEAD)

          WORK=$(mktemp -d)
          git worktree add "$WORK" test
          rsync -a --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            ./ "$WORK/"

          cd "$WORK"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish to test."
          else
            git -c user.email="ci@://github.com" \
                -c user.name="ci-bot" \
              commit -m "build: dev@${SHA_SHORT} (arb=v0.1.0)"
            git push origin test
          fi
