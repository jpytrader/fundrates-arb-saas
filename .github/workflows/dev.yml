name: dev — build & promote to test branch

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: saas-dev
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write # Allows explicit automatic downstream runner triggers
    env:
      GH_DEP_TOKEN: ${{ secrets.GH_DEP_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.CI_PAT }}

      - uses: ./.github/actions/ensure-branch
        with:
          branch: test
          base: dev
          protect: 'true'
          token: ${{ secrets.CI_PAT }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Auto-heal out-of-sync lockfiles on the cloud runner
      - name: Automate out-of-sync lockfile update
        run: |
          set -euo pipefail
          
          # FORCE CLEAN COMPILATION CACHE: Deletes the broken lock file to clear Bun's memory
          rm -f bun.lock bun.lockb
          
          # Allow Git rewrite configuration locally so Bun can see the repo structure if needed
          git config --global url."https://x-access-token:${GH_DEP_TOKEN}@://github.com".insteadOf "https://://github.com"
          
          # Run install to generate a fresh, pristine lockfile from the corrected package.json url
          bun install
          
          # Clean up the temporary rewrite setting immediately
          git config --global --unset-all url."https://x-access-token:${GH_DEP_TOKEN}@://github.com".insteadOf || true
          
          # Stage the newly generated lockfile
          git add bun.lock bun.lockb package.json 2>/dev/null || true
          
          # Check if there is anything staged for a commit
          if ! git diff --cached --quiet; then
            echo "Lockfile discrepancy detected. Committing fresh Bun lock matrix..."
            git config user.email "ci-bot@users.noreply.github.com"
            git config user.name "ci-bot"
            git commit -m "chore: automated bun lockfile synchronization [skip ci]"
            git push origin dev
          else
            echo "Lockfile is verified in sync with package dependencies."
          fi

      - name: Resolve and install fundrates-arb
        run: node scripts/install-arb.mjs
      
      - name: Debug downloaded package structure
        run: ls -R node_modules/@jpytrader/fundrates-arb

      - run: bun run lint
      - run: bun run test --if-present
      - run: bun run build

      - name: Push build output to test branch
        env:
          GH_TOKEN: ${{ secrets.CI_PAT }}
        run: |
          set -euo pipefail
          SHA_SHORT=$(git rev-parse --short HEAD)

          git worktree prune || true
          WORK="./.git_worktree_test"
          rm -rf "$WORK"
          
          git worktree add "$WORK" test

          # Deep-clean the worktree target to isolate compiled distribution states
          cd "$WORK"
          git rm -rf . 2>/dev/null || rm -rf *
          cd - > /dev/null

          # Explicitly copy structural requirements for staging evaluation
          cp -r dist "$WORK/"
          cp -r .github "$WORK/"
          
          # Added workspace environment support blocks to staging output
          [ -d "scripts" ] && cp -r scripts "$WORK/"
          [ -d "migrations" ] && cp -r migrations "$WORK/"
          [ -d "edge-functions" ] && cp -r edge-functions "$WORK/"
          
          # Maintain root configuration primitives
          cp bun.lock bun.lockb package.json package-lock.json .npmrc "$WORK/" 2>/dev/null || true
          cp *.md "$WORK/" 2>/dev/null || true

          cd "$WORK"
          git add -A
          if git diff --cached --quiet; then
            echo "No compiled delivery changes detected."
          else
            # FIXED: Corrected invalid email formatting
            git -c user.email="ci-bot@users.noreply.github.com" \
                -c user.name="ci-bot" \
              commit -m "build: compile dev@${SHA_SHORT} (arb=v0.1.0)"
            git push origin test --force
          fi
          
          # FIXED: Forces the test workflow file to run automatically immediately after the push
          echo "Triggering test.yml automated deployment chain run..."
          gh workflow run test.yml --ref test
