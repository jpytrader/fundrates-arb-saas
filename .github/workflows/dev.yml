name: dev — build & promote to test branch

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: saas-dev
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_DEP_TOKEN: ${{ secrets.GH_DEP_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.CI_PAT }}

      - uses: ./.github/actions/ensure-branch
        with:
          branch: test
          base: dev
          protect: 'true'
          token: ${{ secrets.CI_PAT }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Resolve and install fundrates-arb
        run: node scripts/install-arb.mjs
      
      - name: Debug downloaded package structure
        run: ls -R node_modules/@jpytrader/fundrates-arb

      - run: bun run lint
      - run: bun run test --if-present
      - run: bun run build

      # FIXED: Wipes target workspace completely and copies ONLY compiled and configuration assets
      - name: Push build output and workflows to test branch
        env:
          GH_TOKEN: ${{ secrets.CI_PAT }}
        run: |
          set -euo pipefail
          SHA_SHORT=$(git rev-parse --short HEAD)

          git worktree prune || true
          WORK=$(mktemp -d)
          git worktree add "$WORK" test

          # Deep-clean the worktree to prevent raw development files from persisting
          find "$WORK" -maxdepth 1 ! -name '.' ! -name '.git' -exec rm -rf {} +

          # Selectively copy only production artifacts and workflow automation layers
          cp -r dist "$WORK/"
          cp -r .github "$WORK/"
          
          # Safely copy top-level configuration metadata
          cp package.json package-lock.json .npmrc "$WORK/" 2>/dev/null || true
          cp *.md "$WORK/" 2>/dev/null || true

          cd "$WORK"
          git add -A
          if git diff --cached --quiet; then
            echo "No compiled delivery changes detected. Skipping branch update."
          else
            # FIXED: Corrected invalid email formatting token string block
            git -c user.email="ci-bot@users.noreply.github.com" \
                -c user.name="ci-bot" \
              commit -m "build: compile dev@${SHA_SHORT} (arb=v0.1.0)"
            git push origin test
          fi
