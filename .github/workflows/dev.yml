name: dev — build & promote to test branch

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: saas-dev
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_DEP_TOKEN: ${{ secrets.GH_DEP_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.CI_PAT }}

      - uses: ./.github/actions/ensure-branch
        with:
          branch: test
          base: dev
          protect: 'true'
          token: ${{ secrets.CI_PAT }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Resolve and install fundrates-arb
        run: node scripts/install-arb.mjs

      - run: bun run lint
      - run: bun run test --if-present
      - run: bun run build

      - name: Push build output to test branch
        env:
          GH_TOKEN: ${{ secrets.CI_PAT }}
        run: |
          set -euo pipefail
          SHA_SHORT=$(git rev-parse --short HEAD)

          git worktree prune || true
          WORK="./.git_worktree_test"
          rm -rf "$WORK"
          
          git worktree add "$WORK" test

          # Isolate the branch by removing ALL inherited dev folders and source code files
          cd "$WORK"
          git rm -rf . 2>/dev/null || rm -rf *
          cd - > /dev/null

          # Explicitly copy ONLY the compiled directory and required config files
          cp -r dist "$WORK/"
          cp -r .github "$WORK/"
          cp package.json package-lock.json .npmrc "$WORK/" 2>/dev/null || true
          cp *.md "$WORK/" 2>/dev/null || true

          cd "$WORK"
          git add -A
          if git diff --cached --quiet; then
            echo "No compiled delivery changes detected."
          else
            git -c user.email="ci-bot@://github.com" \
                -c user.name="ci-bot" \
              commit -m "build: compile dev@${SHA_SHORT} (arb=v0.1.0)"
            git push origin test --force
          fi
