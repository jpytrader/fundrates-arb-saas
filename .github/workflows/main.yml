name: main — production deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: saas-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GH_DEP_TOKEN: ${{ secrets.GH_DEP_TOKEN }}
      ARB_OWNER: ${{ github.repository_owner }}
      ARB_PINNED_SHA: ${{ vars.ARB_PINNED_SHA }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install fundrates-arb at pinned SHA
        env:
          ARB_BRANCH: main
        run: node scripts/install-arb.mjs

      - run: bun run build

      - name: Deploy
        run: echo "Deploy production build here."
