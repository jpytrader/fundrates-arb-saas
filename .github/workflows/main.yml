name: main — production deploy

on:
  push:
    branches: [main] # Fires automatically when the promotion PR is merged into main
  workflow_dispatch:

concurrency:
  group: saas-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GH_DEP_TOKEN: ${{ secrets.GH_DEP_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install production dependencies
        run: |
          echo "Resolving final production node modules dependencies payload..."
          # Validated package-lock.json is present and un-mutated for deployment execution
          npm ci --omit=dev

      - name: Deploy
        run: echo "Deploy production build here."
