name: test — E2E & open release PR

on:
  push:
    branches: [test]
  repository_dispatch:
    types: [trigger-test-pipeline] # FIXED: Listens for dev.yml webhook dispatch event
  workflow_dispatch:

concurrency:
  group: saas-test
  cancel-in-progress: true

jobs:
  e2e-and-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_DEP_TOKEN: ${{ secrets.GH_DEP_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.CI_PAT }}

      - uses: ./.github/actions/ensure-branch
        with:
          branch: main
          base: test
          protect: 'true'
          token: ${{ secrets.CI_PAT }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Resolve and install fundrates-arb
        env:
          ARB_OWNER: 'jpytrader'
          ARB_REPO: 'fundrates-arb'
          ARB_TAG: 'v0.1.0'
        run: node scripts/install-arb.mjs

      # - run: bun run test:e2e --if-present

      - name: Sync clean production artifacts to main branch
        env:
          GH_TOKEN: ${{ secrets.CI_PAT }}
        run: |
          set -euo pipefail
          SHA_SHORT=$(git rev-parse --short HEAD)

          git worktree prune || true
          WORK="./.git_worktree_main"
          rm -rf "$WORK"
          
          git worktree add "$WORK" main

          cd "$WORK"
          git rm -rf . 2>/dev/null || rm -rf *
          cd - > /dev/null

          cp -r dist "$WORK/"
          
          [ -d "migrations" ] && cp -r migrations "$WORK/"
          [ -d "edge-functions" ] && cp -r edge-functions "$WORK/"
          
          cp package.json package-lock.json .npmrc "$WORK/" 2>/dev/null || true
          cp *.md "$WORK/" 2>/dev/null || true

          cd "$WORK"
          git add -A
          if git diff --cached --quiet; then
            echo "No production configuration changes detected."
          else
            git -c user.email="ci-bot@://github.com" \
                -c user.name="ci-bot" \
              commit -m "release: promote test@${SHA_SHORT} to production"
            git push origin main --force
          fi
          
          # FIXED: Triggers main.yml via content-scoped repository webhooks
          echo "Dispatching signal payload to trigger production deployment..."
          gh api /repos/${{ github.repository }}/dispatches -F event_type="trigger-production-deployment"
