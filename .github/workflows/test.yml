name: test — E2E & open release PR

on:
  push:
    branches: [test]
  repository_dispatch:
    types: [trigger-test-pipeline] # Catches the automated signal from dev branch
  workflow_dispatch:

concurrency:
  group: saas-test
  cancel-in-progress: true

jobs:
  e2e-and-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write # Crucial: Allows GitHub CLI to open a PR on origin
    env:
      GH_DEP_TOKEN: ${{ secrets.GH_DEP_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.CI_PAT }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Resolve and install fundrates-arb
        env:
          ARB_OWNER: 'jpytrader'
          ARB_REPO: 'fundrates-arb'
          ARB_TAG: 'v0.1.0'
        run: node scripts/install-arb.mjs

      # - run: bun run test:e2e --if-present

      - name: Format Clean Production Bundle and Open Pull Request
        env:
          GH_TOKEN: ${{ secrets.CI_PAT }}
        run: |
          set -euo pipefail
          SHA_SHORT=$(git rev-parse --short HEAD)

          # Define an isolated workspace branch name for the production artifact payload
          RELEASE_BRANCH="release/prod-${SHA_SHORT}"

          # Create a detached standalone workspace outside the main git index to protect artifacts
          WORK="/tmp/clean_production_payload"
          rm -rf "$WORK"
          mkdir -p "$WORK"

          # 1. Copy ONLY core compilation distribution assets into the clean staging path
          cp -r dist "$WORK/"
          
          # Include production readiness data layers
          [ -d "migrations" ] && cp -r migrations "$WORK/"
          [ -d "edge-functions" ] && cp -r edge-functions "$WORK/"
          
          # Maintain structural primitives required for deployment execution
          cp package.json package-lock.json .npmrc "$WORK/" 2>/dev/null || true
          cp *.md "$WORK/" 2>/dev/null || true

          # 2. Check out a clean branch mapping from origin/main to prepare the PR layer
          git worktree prune || true
          git fetch origin main:main || git branch main origin/main || true
          
          # Mount main into a temporary processing directory
          git worktree add -b "$RELEASE_BRANCH" "$WORK/git_mount" main

          # Clean everything existing on the target mount branch path completely
          cd "$WORK/git_mount"
          git rm -rf . 2>/dev/null || rm -rf *
          cd - > /dev/null

          # Transfer the pristine, filtered production payload into the release mount branch
          cp -r $WORK/dist "$WORK/git_mount/"
          [ -d "$WORK/migrations" ] && cp -r $WORK/migrations "$WORK/git_mount/"
          [ -d "$WORK/edge-functions" ] && cp -r $WORK/edge-functions "$WORK/git_mount/"
          cp $WORK/package.json $WORK/package-lock.json $WORK/.npmrc "$WORK/git_mount/" 2>/dev/null || true
          cp $WORK/*.md "$WORK/git_mount/" 2>/dev/null || true

          # Commit the pure distribution structure to the release branch
          cd "$WORK/git_mount"
          git config user.email "ci-bot@://github.com"
          git config user.name "ci-bot"
          git add -A
          git commit -m "release: clean production payload from test@${SHA_SHORT}"
          git push origin "$RELEASE_BRANCH" --force

          # 3. Use official GitHub CLI to generate the production promotion Pull Request targeting main
          echo "Generating automated production promotion Pull Request..."
          gh pr create \
            --base main \
            --head "$RELEASE_BRANCH" \
            --title "Release: promote test -> main (Bundle @ ${SHA_SHORT})" \
            --body "### Automated Production Promotion PR
            Staging and E2E verifications have cleared successfully.
            
            **Pristine Production Footprint Enforced:**
            - `.github/` workflows have been completely excluded.
            - `scripts/` directory has been stripped.
            - Raw development source files are entirely absent." \
            || echo "A promotion PR already exists or was updated successfully."
