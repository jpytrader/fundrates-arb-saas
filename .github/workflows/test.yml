name: test — E2E & open release PR

on:
  push:
    branches: [test]
  workflow_dispatch:

concurrency:
  group: saas-test
  cancel-in-progress: true

jobs:
  e2e-and-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_DEP_TOKEN: ${{ secrets.GH_DEP_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.CI_PAT }}

      - uses: ./.github/actions/ensure-branch
        with:
          branch: main
          base: test
          protect: 'true'
          token: ${{ secrets.CI_PAT }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Resolve and install fundrates-arb
        run: node scripts/install-arb.mjs

      # - run: bun run test:e2e --if-present

      - name: Sync clean production artifacts to main branch
        env:
          GH_TOKEN: ${{ secrets.CI_PAT }}
        run: |
          set -euo pipefail
          SHA_SHORT=$(git rev-parse --short HEAD)

          git worktree prune || true
          WORK="./.git_worktree_main"
          rm -rf "$WORK"
          
          git worktree add "$WORK" main

          # Wipe out ALL files from the main branch tracking layer
          cd "$WORK"
          git rm -rf . 2>/dev/null || rm -rf *
          cd - > /dev/null

          # Copy everything from test EXCEPT the .github workflow directory
          cp -r dist "$WORK/"
          cp package.json package-lock.json .npmrc "$WORK/" 2>/dev/null || true
          cp *.md "$WORK/" 2>/dev/null || true

          cd "$WORK"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to promote to main branch."
          else
            git -c user.email="ci-bot@://github.com" \
                -c user.name="ci-bot" \
              commit -m "release: promote test@${SHA_SHORT} to production"
            git push origin main --force
          fi
