name: test — E2E & open release PR

on:
  push:
    branches: [test]
  workflow_dispatch:

concurrency:
  group: saas-test
  cancel-in-progress: true

jobs:
  e2e-and-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      GH_DEP_TOKEN: ${{ secrets.GH_DEP_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.CI_PAT }}

      - uses: ./.github/actions/ensure-branch
        with:
          branch: main
          base: test
          protect: 'true'
          token: ${{ secrets.CI_PAT }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Resolve and install fundrates-arb
        run: node scripts/install-arb.mjs

      - run: bun run test:e2e --if-present

      - name: Open or update PR test -> main
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.CI_PAT }}
          branch: test
          base: main
          title: 'Release: promote test -> main'
          body: |
            Automated promotion PR.
            E2E passed on `test` @ ${{ github.sha }}.
            Targeting locked version: `fundrates-arb@v0.1.0`.
