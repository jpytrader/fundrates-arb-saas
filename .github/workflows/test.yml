name: test — E2E & open release PR

on:
  push:
    branches: [test]
  workflow_dispatch: # Allows explicit cross-workflow chain calling

concurrency:
  group: saas-test
  cancel-in-progress: true

jobs:
  e2e-and-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write # Allows explicit automatic downstream runner triggers
    env:
      GH_DEP_TOKEN: ${{ secrets.GH_DEP_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.CI_PAT }}

      - uses: ./.github/actions/ensure-branch
        with:
          branch: main
          base: test
          protect: 'true'
          token: ${{ secrets.CI_PAT }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Resolve and install fundrates-arb
        run: node scripts/install-arb.mjs

      # - run: bun run test:e2e --if-present

      - name: Sync clean production artifacts to main branch
        env:
          GH_TOKEN: ${{ secrets.CI_PAT }}
        run: |
          set -euo pipefail
          SHA_SHORT=$(git rev-parse --short HEAD)

          git worktree prune || true
          WORK="./.git_worktree_main"
          rm -rf "$WORK"
          
          git worktree add "$WORK" main

          # Clear the deployment environment tracking target completely
          cd "$WORK"
          git rm -rf . 2>/dev/null || rm -rf *
          cd - > /dev/null

          # Copy core compilation distribution payload
          cp -r dist "$WORK/"
          
          # Direct filtering to include migrations and edge functions while ignoring scripts/.github
          [ -d "migrations" ] && cp -r migrations "$WORK/"
          [ -d "edge-functions" ] && cp -r edge-functions "$WORK/"
          
          # Copy production manifest configuration items
          cp package.json package-lock.json .npmrc "$WORK/" 2>/dev/null || true
          cp *.md "$WORK/" 2>/dev/null || true

          cd "$WORK"
          git add -A
          if git diff --cached --quiet; then
            echo "No production configuration changes detected."
          else
            # FIXED: Corrected invalid email formatting
            git -c user.email="ci-bot@users.noreply.github.com" \
                -c user.name="ci-bot" \
              commit -m "release: promote test@${SHA_SHORT} to production"
            git push origin main --force
          fi
          
          # FIXED: Forces the production deploy workflow file to run automatically immediately after the push
          echo "Triggering main.yml automated production deployment run..."
          gh workflow run main.yml --ref main
